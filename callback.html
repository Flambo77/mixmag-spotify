<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Spotify Login Callback</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Space+Mono&display=swap" rel="stylesheet">
<style>
  body { background:#0a0a0a; color:#f0f0f0; font-family:'Space Mono',monospace; display:flex; align-items:center; justify-content:center; min-height:100vh; margin:0; }
  .box { max-width:520px; width:90%; text-align:center; }
  .logo { font-family:'Syne',sans-serif; font-size:11px; letter-spacing:4px; color:#1DB954; margin-bottom:16px; }
  h1 { font-family:'Syne',sans-serif; font-size:24px; font-weight:800; margin-bottom:16px; }
  h1 span { color:#1DB954; }
  .code-box { background:#111; border:1px solid #1DB954; padding:16px; margin:20px 0; font-size:12px; word-break:break-all; text-align:left; }
  .code-label { font-size:10px; letter-spacing:2px; color:#555; margin-bottom:8px; }
  .code-value { color:#1DB954; font-size:13px; }
  .btn { background:#1DB954; color:#000; font-family:'Syne',sans-serif; font-weight:700; font-size:13px; letter-spacing:2px; text-transform:uppercase; padding:14px 28px; border:none; cursor:pointer; margin-top:8px; width:100%; }
  .btn:hover { background:#1ed760; }
  .note { font-size:10px; color:#555; margin-top:16px; line-height:1.8; }
</style>
</head>
<body>
<div class="box">
  <div class="logo">MIXMAG × SPOTIFY</div>
  <h1>✓ Bijna <span>klaar!</span></h1>
  <p style="font-size:12px;color:#aaa;margin-bottom:8px">Je bent ingelogd bij Spotify. Kopieer de code hieronder en plak die in de tool.</p>

  <div class="code-box">
    <div class="code-label">JOUW CODE</div>
    <div class="code-value" id="codeDisplay">Bezig met ophalen...</div>
  </div>

  <button class="btn" onclick="copyCode()">⎘ Kopieer code</button>
  <p class="note">Ga terug naar het HTML bestand en plak de code in het vakje.</p>
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const code = params.get("code");
  const error = params.get("error");

  if (code) {
    document.getElementById("codeDisplay").textContent = code;
  } else if (error) {
    document.getElementById("codeDisplay").textContent = "Fout: " + error;
  } else {
    document.getElementById("codeDisplay").textContent = "Geen code gevonden in URL.";
  }

  function copyCode() {
    if (code) {
      navigator.clipboard.writeText(code).then(() => {
        document.querySelector(".btn").textContent = "✓ Gekopieerd!";
        setTimeout(() => document.querySelector(".btn").textContent = "⎘ Kopieer code", 2000);
      });
    }
  }
</script>
</body>
</html>
